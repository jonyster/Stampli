<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contract Extract (Sample)</title>
    <style>
      body { font-family: Inter, Arial, sans-serif; margin: 24px; color: #111827; }
      h1 { font-size: 20px; margin-bottom: 6px; }
      .meta { color: #6b7280; font-size: 12px; margin-bottom: 18px; }
      .section { border: 1px solid #e5e7eb; border-radius: 8px; padding: 14px; margin-bottom: 10px; }
      .title { font-size: 12px; font-weight: 700; text-transform: uppercase; color: #6b7280; margin-bottom: 6px; }
      .warn { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; padding: 10px; border-radius: 8px; font-size: 12px; }
      .ok { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; padding: 10px; border-radius: 8px; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>Contract / SOW Extract (Sample)</h1>
    <div class="meta" id="meta">Fake contract evidence for demo purposes only</div>

    <div class="section">
      <div class="title">Contract ID</div>
      <div id="contractId">CON-XXXX</div>
    </div>
    <div class="section">
      <div class="title">Total Contract Value</div>
      <div id="tcv">$0.00</div>
    </div>
    <div class="section">
      <div class="title">YTD Spend Before Current Invoice</div>
      <div id="ytd">$0.00</div>
    </div>
    <div class="section">
      <div class="title">Current Invoice Amount</div>
      <div id="invoiceAmount">$0.00</div>
    </div>
    <div id="status" class="ok"></div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const contractId = params.get("contractId") || "CON-XXXX";
      const invoiceId = params.get("invoiceId") || "INV-XXXX";
      const tcv = Number(params.get("tcv") || 0);
      const ytd = Number(params.get("ytd") || 0);
      const invoiceAmount = Number(params.get("invoiceAmount") || 0);
      const projected = ytd + invoiceAmount;

      document.getElementById("meta").textContent = `Contract ${contractId} aligned for invoice ${invoiceId} (fake demo artifact)`;
      document.getElementById("contractId").textContent = contractId;
      document.getElementById("tcv").textContent = `$${tcv.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
      document.getElementById("ytd").textContent = `$${ytd.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
      document.getElementById("invoiceAmount").textContent = `$${invoiceAmount.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;

      const statusEl = document.getElementById("status");
      if (projected > tcv) {
        statusEl.className = "warn";
        statusEl.textContent = `Action required: projected spend $${projected.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })} exceeds contract cap by $${(projected - tcv).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}.`;
      } else {
        statusEl.className = "ok";
        statusEl.textContent = `Projected spend after this invoice is $${projected.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}, within contract cap.`;
      }
    </script>
  </body>
</html>
