<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>W-9 Vendor Document (Sample)</title>
    <style>
      body { font-family: Inter, Arial, sans-serif; margin: 24px; color: #111827; }
      h1 { font-size: 20px; margin-bottom: 6px; }
      .meta { color: #6b7280; font-size: 12px; margin-bottom: 18px; }
      .box { border: 1px solid #e5e7eb; border-radius: 8px; padding: 14px; margin-bottom: 10px; }
      .label { font-size: 11px; text-transform: uppercase; color: #6b7280; }
      .value { font-weight: 600; margin-top: 3px; }
    </style>
  </head>
  <body>
    <h1>Form W-9 (Sample)</h1>
    <div class="meta" id="meta">Fake compliance document for demo purposes only</div>

    <div class="box">
      <div class="label">Vendor legal name</div>
      <div class="value" id="vendorName">Vendor LLC</div>
    </div>
    <div class="box">
      <div class="label">Tax classification</div>
      <div class="value" id="classification">Limited Liability Company (LLC)</div>
    </div>
    <div class="box">
      <div class="label">TIN (masked)</div>
      <div class="value" id="tin">XX-XXX0000</div>
    </div>
    <div class="box">
      <div class="label">W-9 status</div>
      <div class="value" id="status">valid</div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const vendorName = params.get("vendorName") || "Vendor LLC";
      const status = params.get("w9Status") || "valid";
      const tin = params.get("tin") || "XX-XXX0000";

      document.getElementById("meta").textContent = `Fake W-9 evidence aligned to ${vendorName}`;
      document.getElementById("vendorName").textContent = vendorName;
      document.getElementById("status").textContent = status;
      document.getElementById("tin").textContent = tin;
    </script>
  </body>
</html>
